name: CI

on:
  push:
    branches: [ '**' ]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  ARDUINO_BOARD_MANAGER_ADDITIONAL_URLS: https://espressif.github.io/arduino-esp32/package_esp32_index.json
  ARDUINO_CLI_VERSION: 1.5.0
  ARDUINO_NETWORK_CONNECTION_TIMEOUT: 240s
  ESP32_CORE_VERSION: 3.3.9
  PIOARDUINO_PLATFORM_URL: https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
  PIOARDUINO_PLATFORM_VERSION: 55.03.39
  PIOARDUINO_VERSION: 6.1.19

jobs:
  source-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit production sources
        run: |
          if grep -RInE '(^|[^[:alnum:]_])throw([^[:alnum:]_]|$)|std::abort[[:space:]]*\(' src; then
            echo "Embedded safety audit failed"
            exit 1
          fi

  build-examples:
    runs-on: ubuntu-latest
    needs: source-audit
    strategy:
      fail-fast: false
      matrix:
        board: [esp32dev, esp32-s3-devkitc-1, esp32-c3-devkitm-1, esp32-p4-evboard]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache PIOArduino
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pioarduino-${{ env.PIOARDUINO_VERSION }}-${{ env.PIOARDUINO_PLATFORM_VERSION }}-${{ hashFiles('**/library.json') }}
          restore-keys: |
            ${{ runner.os }}-pioarduino-${{ env.PIOARDUINO_VERSION }}-${{ env.PIOARDUINO_PLATFORM_VERSION }}-

      - name: Install PIOArduino Core
        run: python -m pip install --upgrade "pioarduino==${PIOARDUINO_VERSION}"

      - name: Install PIOArduino ESP32 Platform
        run: pio pkg install -g -p "${PIOARDUINO_PLATFORM_URL}"

      - name: Build library examples
        run: |
          set -e
          for d in examples/*; do
            if [ -d "$d" ]; then
              echo "Building $d on ${{ matrix.board }}"
              pio ci "$d" \
                --board ${{ matrix.board }} \
                --lib="." \
                --project-option "platform=${PIOARDUINO_PLATFORM_URL}" \
                --project-option "build_unflags=-std=gnu++11" \
                --project-option "build_flags=-std=gnu++20"
            fi
          done

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [source-audit, build-examples, arduino-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate release changelog
        run: |
          python3 scripts/generate_release_changelog.py \
            --target-ref "${GITHUB_REF_NAME}" \
            --tag-name "${GITHUB_REF_NAME}" \
            --output "release-changelog.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
          body_path: release-changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  arduino-cli:
    runs-on: ubuntu-latest
    needs: source-audit
    strategy:
      fail-fast: false
      matrix:
        board:
          - fqbn: esp32:esp32:esp32
            name: esp32dev
          - fqbn: esp32:esp32:esp32s3
            name: esp32-s3-devkitc-1
          - fqbn: esp32:esp32:esp32c3
            name: esp32-c3-devkitm-1
          - fqbn: esp32:esp32:esp32p4
            name: esp32-p4-evboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: ${{ env.ARDUINO_CLI_VERSION }}

      - name: Cache Arduino CLI packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/.cache/arduino
          key: ${{ runner.os }}-arduino-cli-${{ env.ARDUINO_CLI_VERSION }}-esp32-${{ env.ESP32_CORE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-arduino-cli-${{ env.ARDUINO_CLI_VERSION }}-esp32-

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install "esp32:esp32@${ESP32_CORE_VERSION}"

      - name: Add local library to sketchbook
        run: |
          set -e
          SKETCHBOOK_DIR="${HOME}/Arduino"
          mkdir -p "$SKETCHBOOK_DIR/libraries/Worker"
          rsync -a --delete --exclude ".git" ./ "$SKETCHBOOK_DIR/libraries/Worker/"

      - name: Build examples (${{ matrix.board.name }})
        env:
          FQBN: ${{ matrix.board.fqbn }}
        run: |
          set -e
          for d in examples/*; do
            if [ -d "$d" ]; then
              echo "Compiling $d"
              arduino-cli compile \
                --fqbn "$FQBN" \
                --build-property "compiler.cpp.extra_flags=-std=gnu++20" \
                "$d"
            fi
          done
