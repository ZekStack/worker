name: CI

on:
  push:
    branches: [ main, master, 'feature/**' ]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  source-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit production sources
        run: |
          if grep -RInE '(^|[^[:alnum:]_])throw([^[:alnum:]_]|$)|std::abort[[:space:]]*\(' src; then
            echo "Embedded safety audit failed"
            exit 1
          fi

  build-examples:
    runs-on: ubuntu-latest
    needs: source-audit
    strategy:
      fail-fast: false
      matrix:
        board: [esp32dev, esp32-s3-devkitc-1, esp32-c3-devkitm-1, esp32-p4-evboard]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache PIOArduino
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pioarduino-core-6.1.19-${{ hashFiles('**/library.json') }}
          restore-keys: |
            ${{ runner.os }}-pioarduino-core-6.1.19-

      - name: Install PIOArduino Core
        run: python -m pip install --upgrade https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Install PIOArduino ESP32 Platform
        run: pio pkg install -g -p https://github.com/pioarduino/platform-espressif32.git

      - name: Build library examples
        run: |
          set -e
          for d in examples/*; do
            if [ -d "$d" ]; then
              echo "Building $d on ${{ matrix.board }}"
              pio ci "$d" \
                --board ${{ matrix.board }} \
                --lib="." \
                --project-option "platform=https://github.com/pioarduino/platform-espressif32.git" \
                --project-option "build_unflags=-std=gnu++11" \
                --project-option "build_flags=-std=gnu++20"
            fi
          done

  arduino-cli:
    runs-on: ubuntu-latest
    needs: source-audit
    strategy:
      fail-fast: false
      matrix:
        board:
          - fqbn: esp32:esp32:esp32
            name: esp32dev
          - fqbn: esp32:esp32:esp32s3
            name: esp32-s3-devkitc-1
          - fqbn: esp32:esp32:esp32c3
            name: esp32-c3-devkitm-1
          - fqbn: esp32:esp32:esp32p4
            name: esp32-p4-evboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Add local library to sketchbook
        run: |
          set -e
          SKETCHBOOK_DIR="${HOME}/Arduino"
          mkdir -p "$SKETCHBOOK_DIR/libraries/Worker"
          rsync -a --delete --exclude ".git" ./ "$SKETCHBOOK_DIR/libraries/Worker/"

      - name: Build examples (${{ matrix.board.name }})
        env:
          FQBN: ${{ matrix.board.fqbn }}
        run: |
          set -e
          for d in examples/*; do
            if [ -d "$d" ]; then
              echo "Compiling $d"
              arduino-cli compile \
                --fqbn "$FQBN" \
                --build-property "compiler.cpp.extra_flags=-std=gnu++20" \
                "$d"
            fi
          done
